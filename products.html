<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabini Agro Global</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #0a7d3b;
    --secondary: #13c26b;
    --bg: #f4f6f9;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    background: var(--bg);
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.7);
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    align-items: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

.logo {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
}

.nav-right {
    display: flex;
    gap: 20px;
    align-items: center;
}

.cart {
    position: relative;
    cursor: pointer;
}

.cart span {
    position: absolute;
    top: -8px;
    right: -10px;
    background: red;
    color: white;
    font-size: 10px;
    padding: 3px 6px;
    border-radius: 50%;
}

/* CONTROLS */
.controls {
    display: flex;
    gap: 15px;
    padding: 20px 40px;
    flex-wrap: wrap;
}

.controls input, .controls select {
    padding: 10px 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: white;
}

/* GRID */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
    gap: 25px;
    padding: 20px 40px;
}

/* CARD */
.card {
    background: white;
    border-radius: 20px;
    padding: 15px;
    transition: 0.4s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
}

.card img {
    width: 100%;
    border-radius: 15px;
}

/* WISHLIST */
.wishlist {
    position: absolute;
    top: 15px;
    right: 15px;
    background: white;
    padding: 6px;
    border-radius: 50%;
    cursor: pointer;
}

/* TEXT */
.card h3 {
    margin: 10px 0;
}

.price {
    color: var(--primary);
    font-weight: 600;
}

.old {
    text-decoration: line-through;
    font-size: 13px;
    color: gray;
}

.badge {
    background: red;
    color: white;
    padding: 3px 6px;
    border-radius: 5px;
    font-size: 12px;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg,var(--primary),var(--secondary));
    color: white;
    cursor: pointer;
}

/* TOAST */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    display: none;
}

/* LOAD */
.load-more {
    text-align: center;
    margin: 20px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .navbar, .controls, .products {
        padding: 15px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Kabini Agro Global</div>
    <div class="nav-right">
        <div class="cart">🛒 <span id="cartCount">0</span></div>
    </div>
</div>

<!-- CONTROLS -->
<div class="controls">
    <input type="text" id="search" placeholder="Search...">
    
    <select id="category">
        <option value="">All Categories</option>
        <option value="farm">Farm</option>
        <option value="tools">Tools</option>
    </select>

    <select id="sort">
        <option value="">Sort</option>
        <option value="low">Price Low</option>
        <option value="high">Price High</option>
    </select>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<div class="load-more">
    <button onclick="loadMore()">Load More</button>
</div>

<div class="toast" id="toast"></div>

<script>
const data = [
    {name:"Tomatoes",price:20,old:30,cat:"farm",img:"https://via.placeholder.com/300"},
    {name:"Maize",price:15,old:25,cat:"farm",img:"https://via.placeholder.com/300"},
    {name:"Tractor",price:150,old:200,cat:"tools",img:"https://via.placeholder.com/300"},
    {name:"Pump",price:80,old:100,cat:"tools",img:"https://via.placeholder.com/300"},
    {name:"Rice",price:40,old:60,cat:"farm",img:"https://via.placeholder.com/300"},
    {name:"Hoe",price:10,old:20,cat:"tools",img:"https://via.placeholder.com/300"}
];

let visible = 4;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showToast(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",2000);
}

function render(){
    let container = document.getElementById("products");
    container.innerHTML = "";

    let search = document.getElementById("search").value.toLowerCase();
    let cat = document.getElementById("category").value;
    let sort = document.getElementById("sort").value;

    let filtered = data.filter(p =>
        p.name.toLowerCase().includes(search) &&
        (cat=="" || p.cat==cat)
    );

    if(sort=="low") filtered.sort((a,b)=>a.price-b.price);
    if(sort=="high") filtered.sort((a,b)=>b.price-a.price);

    filtered.slice(0,visible).forEach(p=>{
        container.innerHTML += `
        <div class="card">
            <div class="wishlist">❤️</div>
            <img src="${p.img}">
            <h3>${p.name}</h3>
            <div>
                <span class="price">$${p.price}</span>
                <span class="old">$${p.old}</span>
                <span class="badge">-${Math.round((1-p.price/p.old)*100)}%</span>
            </div>
            <button onclick='details(${JSON.stringify(p)})'>View Details</button>
            <button onclick='addCart(${JSON.stringify(p)})'>Add to Cart</button>
        </div>`;
    });
}

function details(p){
    localStorage.setItem("product", JSON.stringify(p));
    window.location.href="product-details.html";
}

function addCart(p){
    cart.push(p);
    localStorage.setItem("cart", JSON.stringify(cart));
    document.getElementById("cartCount").innerText = cart.length;
    showToast("Added to cart");
}

function loadMore(){
    visible += 2;
    render();
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("category").addEventListener("change",render);
document.getElementById("sort").addEventListener("change",render);

document.getElementById("cartCount").innerText = cart.length;

render();
</script>

</body>
</html>
