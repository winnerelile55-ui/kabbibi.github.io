<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kabini Global - Products</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= ROOT ================= */
:root{
--green:#0f5f2f;
--gold:#d4af37;
--brown:#5c4033;
--bg:#f7f5f0;
--card:#ffffff;
}

/* ================= GLOBAL ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
overflow-x:hidden;
}

/* ================= NAV ================= */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
background:rgba(15,95,47,0.95);
backdrop-filter:blur(15px);
z-index:1000;
color:#fff;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:700;
}

.logo img{
height:40px;
border-radius:8px;
}

/* NAV LINKS */
nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:#fff;
text-decoration:none;
font-weight:600;
}

/* HAMBURGER */
.menu-toggle{
display:none;
flex-direction:column;
cursor:pointer;
}

.menu-toggle div{
width:25px;
height:3px;
background:#fff;
margin:4px;
}

/* MOBILE NAV */
@media(max-width:768px){

.menu-toggle{display:flex;}

nav ul{
position:fixed;
top:65px;
right:-100%;
width:260px;
height:100%;
background:#fff;
flex-direction:column;
padding:20px;
transition:0.4s;
}

nav ul.active{
right:0;
}

nav ul li{
padding:14px;
background:#f2f2f2;
border-radius:10px;
}

nav a{color:#000;}

}

/* ================= HERO ================= */
.hero{
margin-top:90px;
text-align:center;
padding:30px 15px;
}

.hero img{
width:120px;
border-radius:10px;
}

.hero h1{
margin-top:10px;
color:var(--green);
}

/* ================= CONTROLS ================= */
.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:15px;
justify-content:center;
}

.controls input,
.controls select{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
width:100%;
max-width:250px;
}

/* ================= PRODUCTS GRID ================= */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:var(--card);
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.3s;
position:relative;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.price{
color:var(--green);
font-weight:700;
}

.timer{
font-size:12px;
color:red;
}

/* BADGES */
.sale{
position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.timer-badge{
position:absolute;
top:10px;
left:10px;
background:var(--gold);
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* BUTTONS */
.btn{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.add{
background:var(--green);
color:#fff;
}

.details{
background:var(--gold);
color:#000;
}

/* ================= TOAST ================= */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:var(--green);
color:#fff;
padding:10px 15px;
border-radius:8px;
opacity:0;
transition:0.3s;
}

.toast.show{
opacity:1;
}

/* ================= FOOTER ================= */
footer{
text-align:center;
padding:20px;
background:var(--green);
color:#fff;
margin-top:30px;
}

</style>

</head>

/* ================= RENDER ================= */
function render(){

let s=search.value.toLowerCase()
let c=category.value

productsContainer.innerHTML=""

products.forEach(p=>{

if(p.name.toLowerCase().includes(s) && (c==="all"||p.cat===c)){

let end=new Date().getTime()+86400000

productsContainer.innerHTML+=`
<div class="card">

${p.sale?'<div class="sale">SALE</div>':''}
<div class="timer-badge" id="t-${p.id}">...</div>

<img src="${p.img}">

<div class="card-content">
<h4>${p.name}</h4>
<p class="price">₦${p.price}</p>

<button class="btn add" onclick="addCart(${p.id})">Add to Cart</button>
<button class="btn details" onclick="viewDetails(${p.id})">View Details</button>

</div>

</div>
`

setInterval(()=>{
let el=document.getElementById(`t-${p.id}`)
if(el) el.innerText=timer(end)
},1000)

}

})

}

/* ================= TIMER ================= */
function timer(end){
let now=new Date().getTime()
let d=end-now
let h=Math.floor(d/(1000*60*60))
let m=Math.floor((d%(1000*60*60))/(1000*60))
let s=Math.floor((d%(1000*60))/1000)
return `${h}h ${m}m ${s}s`
}

/* ================= CART ================= */
function addCart(id){

let cart=JSON.parse(localStorage.getItem("cart"))||[]
let item=products.find(p=>p.id===id)

cart.push({...item,qty:1})

localStorage.setItem("cart",JSON.stringify(cart))

toast("Added to cart")

}

/* ================= VIEW DETAILS ================= */
function viewDetails(id){

let item=products.find(p=>p.id===id)

localStorage.setItem("selectedProduct",JSON.stringify(item))

window.location.href="product-details.html"

}

/* ================= TOAST ================= */
function toast(msg){
let t=document.getElementById("toast")
t.innerText=msg
t.classList.add("show")

setTimeout(()=>t.classList.remove("show"),2000)
}

/* ================= INIT ================= */
const productsContainer=document.getElementById("products")

search.oninput=render
category.onchange=render

render()

</script>
