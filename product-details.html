<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kabini Global | Product Details</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= ROOT ================= */
:root{
--green:#0f5f2f;
--gold:#d4af37;
--brown:#5c4033;
--bg:#f7f5f0;
--card:#ffffff;
--radius:18px;
--shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* ================= GLOBAL ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:#222;
}

/* ================= NAV ================= */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
background:rgba(15,95,47,0.95);
backdrop-filter:blur(15px);
color:#fff;
z-index:1000;
}

nav img{
height:40px;
border-radius:6px;
}

.back-btn{
background:var(--gold);
border:none;
padding:8px 14px;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

/* ================= CONTAINER ================= */
.container{
margin-top:90px;
padding:15px;
}

/* ================= PRODUCT CARD ================= */
.product-card{
background:var(--card);
border-radius:var(--radius);
box-shadow:var(--shadow);
overflow:hidden;
max-width:500px;
margin:auto;
animation:fadeIn 0.6s ease;
}

/* IMAGE */
.product-image{
width:100%;
height:300px;
object-fit:cover;
}

/* CONTENT */
.product-content{
padding:15px;
}

.product-title{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.price{
font-size:20px;
color:var(--green);
font-weight:700;
}

.old-price{
text-decoration:line-through;
opacity:0.5;
margin-left:10px;
}

/* TIMER */
.timer{
margin-top:10px;
color:red;
font-weight:600;
}

/* DESCRIPTION */
.description{
margin-top:15px;
font-size:14px;
line-height:1.6;
color:#444;
}

/* ================= ACTIONS ================= */
.actions{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.add{
background:var(--green);
color:#fff;
}

.buy{
background:var(--gold);
color:#000;
}

.btn:active{
transform:scale(0.97);
}

/* ================= EXTRA INFO ================= */
.info-box{
margin-top:20px;
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:var(--shadow);
}

.info-box h4{
margin-bottom:10px;
}

/* ================= RELATED ================= */
.related{
margin-top:30px;
}

.related h3{
margin-bottom:10px;
}

.related-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}

.related-card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:var(--shadow);
}

.related-card img{
width:100%;
height:100px;
object-fit:cover;
}

.related-card p{
padding:8px;
font-size:13px;
}

/* ================= TOAST ================= */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:var(--green);
color:#fff;
padding:12px 16px;
border-radius:10px;
opacity:0;
transition:0.3s;
}

.toast.show{
opacity:1;
}

/* ================= ANIMATION ================= */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<!-- NAV -->
<nav>
<img src="https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/IMG-20260323-WA0001.jpg">
<button class="back-btn" onclick="goBack()">← Back</button>
</nav>

<!-- CONTENT -->
<div class="container">

<div class="product-card">

<img id="img" class="product-image">

<div class="product-content">

<h1 class="product-title" id="name"></h1>

<div>
<span class="price" id="price"></span>
<span class="old-price" id="old"></span>
</div>

<div class="timer" id="timer"></div>

<p class="description" id="desc">
This is a premium Kabini Global product sourced with the highest quality standards.
</p>

<!-- ACTIONS -->
<div class="actions">
<button class="btn add" onclick="addToCart()">Add to Cart</button>
<button class="btn buy" onclick="buyNow()">Buy Now</button>
</div>

</div>

</div>

<!-- INFO -->
<div class="info-box">
<h4>Product Information</h4>
<p>
✔ High quality guaranteed<br>
✔ Fresh from trusted sources<br>
✔ Secure packaging<br>
✔ Fast delivery available<br>
</p>
</div>

<!-- RELATED -->
<div class="related">
<h3>Related Products</h3>
<div class="related-grid" id="related"></div>
</div>

</div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

/* ================= GET PRODUCT ================= */
let product = JSON.parse(localStorage.getItem("selectedProduct"))

if(!product){
document.body.innerHTML="<h2 style='text-align:center;margin-top:100px;'>No product selected</h2>"
}

document.getElementById("img").src = product.img
document.getElementById("name").innerText = product.name
document.getElementById("price").innerText = "₦" + product.price
document.getElementById("old").innerText = "₦" + (product.price + 500)

/* ================= TIMER ================= */
let timerValue = 86400

setInterval(()=>{
if(timerValue>0){
timerValue--
let h=Math.floor(timerValue/3600)
let m=Math.floor((timerValue%3600)/60)
let s=timerValue%60

document.getElementById("timer").innerText=
`Offer ends in ${h}h ${m}m ${s}s`
}
},1000)

/* ================= CART ================= */
function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart.push({...product,qty:1})

localStorage.setItem("cart",JSON.stringify(cart))

toast("Added to cart")

}

/* ================= BUY NOW ================= */
function buyNow(){
addToCart()
window.location.href="checkout.html"
}

/* ================= TOAST ================= */
function toast(msg){
let t=document.getElementById("toast")
t.innerText=msg
t.classList.add("show")

setTimeout(()=>t.classList.remove("show"),2000)
}

/* ================= BACK ================= */
function goBack(){
window.history.back()
}

/* ================= RELATED PRODUCTS ================= */
const relatedData = [
{img:"https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/images/IMG-20260331-WA0014.jpg",name:"Related Product 1"},
{img:"https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/IMG-20260325-WA0027.jpg",name:"Related Product 2"},
{img:"https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/images/IMG-20260331-WA0012(1).jpg",name:"Related Product 3"}
]

const related=document.getElementById("related")

relatedData.forEach(p=>{
related.innerHTML+=`
<div class="related-card">
<img src="${p.img}">
<p>${p.name}</p>
</div>
`
})

</script>

</body>
<script src="app.js"></script>
</html>
