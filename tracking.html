<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kabini AgroGlobal | Track Order</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
--green:#1F7A3A;
--dark-green:#145A2A;
--gold:#E8A317;
--bg:#F5F7F2;
--glass:rgba(255,255,255,.18);
--glass-border:rgba(255,255,255,.3);
--radius:22px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--bg);
overflow-x:hidden;
}

/* ================= PARTICLES ================= */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
opacity:.25;
}

/* ================= NAV ================= */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(255,255,255,.65);
backdrop-filter:blur(18px);
z-index:100;
}

.logo{
font-weight:700;
font-size:22px;
color:var(--green);
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
text-decoration:none;
color:#333;
}

/* ================= CONTAINER ================= */
.container{
max-width:1000px;
margin:140px auto;
padding:20px;
}

/* ================= SEARCH ================= */
.search-box{
display:flex;
gap:10px;
margin-bottom:30px;
}

.search-box input{
flex:1;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
}

.btn{
padding:14px 30px;
border:none;
border-radius:50px;
background:var(--gold);
cursor:pointer;
font-weight:600;
}

/* ================= TRACK CARD ================= */
.track-card{
background:var(--glass);
border:1px solid var(--glass-border);
backdrop-filter:blur(18px);
padding:30px;
border-radius:var(--radius);
box-shadow:0 20px 50px rgba(0,0,0,.1);
display:none;
}

/* ================= PROGRESS ================= */
.progress{
display:flex;
justify-content:space-between;
margin-top:40px;
position:relative;
}

.progress::before{
content:"";
position:absolute;
top:20px;
left:0;
width:100%;
height:4px;
background:#ccc;
z-index:-1;
}

.step{
text-align:center;
}

.circle{
width:40px;
height:40px;
border-radius:50%;
background:#ccc;
margin:auto;
line-height:40px;
color:white;
}

.active{
background:var(--green);
}

/* ================= ITEMS ================= */
.items{
margin-top:30px;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

/* ================= STATUS COLORS ================= */
.status{
margin-top:20px;
font-weight:600;
color:var(--green);
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<nav>
<div class="logo">Kabini AgroGlobal</div>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="receipt.html">Receipt</a></li>
</ul>
</nav>

<div class="container">

<h2>Track Your Order</h2>

<div class="search-box">
<input type="text" id="orderId" placeholder="Enter Order ID">
<button class="btn" onclick="trackOrder()">Track</button>
</div>

<div class="track-card" id="trackCard">

<h3 id="orderTitle"></h3>

<div class="status" id="statusText"></div>

<div class="progress">

<div class="step">
<div class="circle" id="step1">1</div>
<p>Processing</p>
</div>

<div class="step">
<div class="circle" id="step2">2</div>
<p>Shipped</p>
</div>

<div class="step">
<div class="circle" id="step3">3</div>
<p>Delivered</p>
</div>

</div>

<div class="items" id="items"></div>

<div class="status" id="total"></div>

</div>

</div>

<script>

/* ================= TRACK FUNCTION ================= */

function trackOrder(){

let id=document.getElementById("orderId").value

let orders=JSON.parse(localStorage.getItem("orders"))||[]

let order=orders.find(o=>o.id==id)

if(!order){
alert("Order not found")
return
}

document.getElementById("trackCard").style.display="block"

document.getElementById("orderTitle").innerText="Order #"+order.id

document.getElementById("statusText").innerText="Status: "+order.status

/* PROGRESS */

document.getElementById("step1").classList.add("active")

if(order.status==="Shipped" || order.status==="Delivered"){
document.getElementById("step2").classList.add("active")
}

if(order.status==="Delivered"){
document.getElementById("step3").classList.add("active")
}

/* ITEMS */

let itemsBox=document.getElementById("items")
itemsBox.innerHTML=""

order.items.forEach(i=>{
itemsBox.innerHTML+=`
<div class="item">
<span>${i.name} x${i.qty}</span>
<span>₦${i.price*i.qty}</span>
</div>
`
})

document.getElementById("total").innerText="Total: ₦"+order.total

}

/* ================= AUTO STATUS SIMULATION ================= */

let orders=JSON.parse(localStorage.getItem("orders"))||[]

orders.forEach(o=>{
let timePassed=(Date.now()-o.id)/1000

if(timePassed>20) o.status="Delivered"
else if(timePassed>10) o.status="Shipped"
else o.status="Processing"
})

localStorage.setItem("orders",JSON.stringify(orders))

/* ================= PARTICLES ================= */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let particles=[]

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
vx:Math.random()-.5,
vy:Math.random()-.5
})
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle="rgba(31,122,58,.5)"
ctx.fill()
})

requestAnimationFrame(animate)
}

animate()

</script>
<script src="shippingCalculator.js"></script>
</body>
</html>
