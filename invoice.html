<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kabini Global | Invoice</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= ROOT ================= */
:root{
--green:#0f5f2f;
--brown:#5c4033;
--gold:#d4af37;
--bg:#fefcf8;
--white:#fff;
}

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
overflow-x:hidden;
}

/* ================= NAVBAR ================= */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(15,95,47,0.9);
backdrop-filter:blur(12px);
z-index:1000;
color:#fff;
}

.logo{
font-weight:700;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:#fff;
text-decoration:none;
font-weight:600;
}

/* ================= HAMBURGER ================= */
.menu-btn{
display:none;
flex-direction:column;
cursor:pointer;
}

.menu-btn span{
width:25px;
height:3px;
background:#fff;
margin:4px;
}

/* MOBILE MENU */
@media(max-width:768px){

.menu-btn{display:flex;}

nav ul{
position:fixed;
top:0;
right:-100%;
width:80%;
height:100vh;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
flex-direction:column;
padding:80px 20px;
transition:.5s;
}

nav ul.active{
right:0;
}

nav ul li{
background:#fff;
padding:15px;
border-radius:10px;
}

nav ul li a{
color:#000;
}
}

/* ================= HERO ================= */
.hero{
height:40vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:#fff;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/IMG-20260323-WA0001.jpg') center/cover;
}

.hero h1{
font-size:2.5rem;
}

/* ================= INVOICE ================= */
.invoice{
max-width:1000px;
margin:100px auto;
background:#fff;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
overflow:hidden;
}

.invoice-header{
padding:30px;
border-bottom:1px solid #ddd;
text-align:center;
}

.invoice-header h2{
color:var(--green);
}

.invoice-table{
width:100%;
border-collapse:collapse;
}

.invoice-table th,
.invoice-table td{
padding:15px;
border-bottom:1px solid #eee;
text-align:left;
}

.invoice-table th{
background:var(--green);
color:#fff;
}

.total{
text-align:right;
padding:20px;
font-size:1.3rem;
font-weight:700;
color:var(--gold);
}

/* BUTTON */
.checkout-btn{
display:block;
margin:20px auto;
padding:15px 30px;
background:var(--green);
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
}

.overlay.active{
display:block;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>

<div class="logo">KABINI LTD</div>

<ul id="menu">
<li><a href="index.html">Home</a></li>
<li><a href="product.html">Products</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="checkout.html">Checkout</a></li>
<li><a href="invoice.html">Invoice</a></li>
<li><a href="order.html">Orders</a></li>
</ul>

<div class="menu-btn" id="menuBtn">
<span></span><span></span><span></span>
</div>

</nav>

<div class="overlay" id="overlay"></div>

<!-- HERO -->
<section class="hero">
<h1>Invoice</h1>
<p>Review your order before payment</p>
</section>

<!-- INVOICE -->
<div class="invoice">

<div class="invoice-header">
<h2>Order Summary</h2>
<p id="date"></p>
</div>

<table class="invoice-table">
<thead>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>

<tbody id="items"></tbody>

</table>

<div class="total">
Total: ₦<span id="total">0</span>
</div>

<button class="checkout-btn" onclick="checkout()">Pay via WhatsApp</button>

</div>

<script>

/* MENU */
const menu=document.getElementById("menu");
const btn=document.getElementById("menuBtn");
const overlay=document.getElementById("overlay");

btn.onclick=()=>{
menu.classList.toggle("active");
overlay.classList.toggle("active");
};

/* DATE */
document.getElementById("date").innerText=new Date().toDateString();

/* CART */
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let container=document.getElementById("items");
let total=0;

cart.forEach(item=>{
let sum=item.price*item.qty;
total+=sum;

container.innerHTML+=`
<tr>
<td>${item.name}</td>
<td>${item.qty}</td>
<td>₦${item.price}</td>
<td>₦${sum}</td>
</tr>
`;
});

document.getElementById("total").innerText=total;

/* WHATSAPP CHECKOUT */
function checkout(){

let message="🛒 Order from Kabini Global\n\n";

cart.forEach(i=>{
message+=`${i.name} x${i.qty} - ₦${i.price}\n`;
});

let total=cart.reduce((a,b)=>a+(b.price*b.qty),0);

message+=`\nTOTAL: ₦${total}`;

let phone="2348107808968";

let url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

localStorage.removeItem("cart");

window.open(url,"_blank");
}

</script>

</body>
<script src="app.js"></script>
</html>
