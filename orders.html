<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabini Global | Orders</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--deep-green:#0f5f2f;
--gold:#d4af37;
--bg:#fefcf8;
--white:#fff;
--transition:all .4s ease;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);}

/* NAV */
nav{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:rgba(15,95,47,.95);
z-index:1000;
}

.logo-container{
display:flex;
align-items:center;
gap:10px;
color:#fff;
font-weight:600;
}

.logo-container img{height:40px;}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:#fff;
text-decoration:none;
font-weight:600;
}

/* HAMBURGER */
.menu-toggle{
display:none;
flex-direction:column;
cursor:pointer;
z-index:1001;
}
.menu-toggle div{
width:25px;height:3px;background:#fff;margin:4px;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
opacity:0;
pointer-events:none;
transition:.3s;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* MOBILE NAV */
@media(max-width:768px){
nav ul{
position:fixed;
top:0;
right:-100%;
height:100%;
width:270px;
flex-direction:column;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:80px 20px;
transition:.4s;
}

nav ul.active{right:0;}

nav ul li{
background:#fff;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

nav ul li a{color:#000;}

.menu-toggle{display:flex;}
}

/* MAIN */
.container{
margin-top:100px;
padding:30px;
max-width:1100px;
margin-left:auto;
margin-right:auto;
}

/* CARD */
.card{
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
margin-bottom:20px;
}

/* ORDER LIST */
.item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

/* TOTAL */
.total{
font-size:20px;
font-weight:700;
color:var(--deep-green);
margin-top:20px;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:14px;
border:none;
width:100%;
border-radius:10px;
background:var(--deep-green);
color:#fff;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{background:#0b4723;}

.clear-btn{
background:red;
margin-top:10px;
}

/* EMPTY */
.empty{
text-align:center;
padding:40px;
color:#777;
}

/* FOOTER */
footer{
background:var(--deep-green);
color:#fff;
text-align:center;
padding:30px;
margin-top:40px;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- NAV -->
<nav>
<div class="logo-container">
<img src="https://raw.githubusercontent.com/winnerelile55-ui/KABINI-GLOBAL-FARMS/refs/heads/main/IMG-20260323-WA0001.jpg">
<span>KABINI LTD</span>
</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="product.html">Products</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="order.html">Orders</a></li>
<li><a href="checkout.html">Checkout</a></li>
<li><a href="receipt.html">Receipt</a></li>
</ul>

<div class="menu-toggle">
<div></div><div></div><div></div>
</div>
</nav>

<!-- MAIN -->
<div class="container">

<div class="card">
<h2>🧾 Order Summary</h2>

<div id="orderList"></div>

<div class="total" id="total">Total: ₦0</div>

<button class="btn" onclick="sendWhatsApp()">Send Order via WhatsApp</button>
<button class="btn clear-btn" onclick="clearCart()">Clear Order</button>
</div>

</div>

<!-- FOOTER -->
<footer>
<p>© 2026 Kabini LTD</p>
</footer>

<script>

/* NAV TOGGLE */
const toggle=document.querySelector('.menu-toggle');
const nav=document.querySelector('nav ul');
const overlay=document.querySelector('.overlay');

toggle.onclick=()=>{
nav.classList.toggle('active');
overlay.classList.toggle('active');
}

overlay.onclick=()=>{
nav.classList.remove('active');
overlay.classList.remove('active');
}

/* LOAD CART */
let cart=JSON.parse(localStorage.getItem("cart")) || [];

const list=document.getElementById("orderList");
const totalEl=document.getElementById("total");

function render(){
list.innerHTML="";
let total=0;

if(cart.length===0){
list.innerHTML="<div class='empty'>No orders yet</div>";
totalEl.innerText="Total: ₦0";
return;
}

cart.forEach(item=>{
total+=item.price*item.qty;

list.innerHTML+=`
<div class="item">
<span>${item.name} x${item.qty}</span>
<span>₦${item.price*item.qty}</span>
</div>
`;
});

totalEl.innerText="Total: ₦"+total;
}

render();

/* WHATSAPP ORDER */
function sendWhatsApp(){
if(cart.length===0){
alert("No items in cart");
return;
}

let message="🛒 *KABINI GLOBAL ORDER*%0A%0A";

let total=0;

cart.forEach(item=>{
message+=`${item.name} x${item.qty} = ₦${item.price*item.qty}%0A`;
total+=item.price*item.qty;
});

message+=`%0A*Total: ₦${total}*`;

window.open(`https://wa.me/2348107808968?text=${message}`,"_blank");

/* CLEAR AFTER ORDER */
localStorage.removeItem("cart");
cart=[];
render();
}

/* CLEAR */
function clearCart(){
localStorage.removeItem("cart");
cart=[];
render();
}

</script>

</body>
<script src="app.js"></script>
</html>
